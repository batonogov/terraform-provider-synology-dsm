version: "3"

vars:
  BINARY: terraform-provider-dsm
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "0.1.0"
  OS:
    sh: go env GOOS
  ARCH:
    sh: go env GOARCH

tasks:
  build:
    desc: Build provider binary
    cmds:
      - go build -ldflags="-s -w" -o bin/{{ .BINARY }} .

  test:
    desc: Run unit tests
    cmds:
      - go test -v -count=1 ./...

  test-acc:
    desc: Run acceptance tests (requires real DSM)
    cmds:
      - TF_ACC=1 go test -v -timeout 30m ./...

  lint:
    desc: Run go vet
    cmds:
      - go vet ./...

  install:
    desc: Install provider to local Terraform plugin directory
    deps: [build]
    cmds:
      - mkdir -p ~/.terraform.d/plugins/registry.terraform.io/batonogov/dsm/{{ .VERSION }}/{{ .OS }}_{{ .ARCH }}
      - cp bin/{{ .BINARY }} ~/.terraform.d/plugins/registry.terraform.io/batonogov/dsm/{{ .VERSION }}/{{ .OS }}_{{ .ARCH }}/{{ .BINARY }}

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/
      - go clean -testcache

  test-env-up:
    desc: Start Lima VM with virtual-dsm for acceptance tests
    cmds:
      - limactl start --name=dsm .lima/dsm.yaml
      - limactl copy docker-compose.test.yml dsm:/tmp/docker-compose.test.yml
      - limactl shell dsm sudo docker compose -f /tmp/docker-compose.test.yml up -d
      - ./scripts/wait-for-dsm.sh
      - ./scripts/setup-dsm.sh
    status:
      - limactl list --format '{{.Name}} {{.Status}}' | grep -q '^dsm Running'

  test-env-down:
    desc: Stop Lima VM with virtual-dsm
    cmds:
      - limactl shell dsm sudo docker compose -f /tmp/docker-compose.test.yml down || true
      - limactl stop dsm

  test-env-status:
    desc: Check test environment status
    cmds:
      - limactl list | grep dsm || echo "Lima VM 'dsm' not found"
      - limactl shell dsm sudo docker ps 2>/dev/null || echo "Docker not running in VM"
